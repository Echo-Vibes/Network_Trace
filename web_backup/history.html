<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="GBK">
    <title>访问历史 - WebTrackDB</title>
    <style>
        .ht { text-align: center; color: cadetblue; font-family: 幼圆; }
        .tab { width: 900px; border: 3px solid cadetblue; margin: 0px auto; border-radius: 5px; font-family: 幼圆; border-collapse: collapse; }
        .ltr td { border: 1px solid powderblue; padding: 8px 12px; }
        .ltr th { border: 1px solid powderblue; padding: 8px 12px; background-color: powderblue; color: #333; font-weight: bold; }
        .ipt { border: 1px solid powderblue; width: 200px; padding: 4px 6px; }
        .btn1 { border: 2px solid powderblue; border-radius: 4px; width: 80px; background-color: antiquewhite; font-family: 幼圆; cursor: pointer; padding: 4px 0; }
        .buttonContainer { text-align: center; }
        a { color: cadetblue; text-decoration: none; }
        a:hover { text-decoration: underline; }
        td.url-cell { max-width: 350px; word-break: break-all; }
    </style>
    <script>
        function loadData() {
            document.getElementById('searchForm').submit();
        }

        function renderData() {
            var frame = document.getElementById('dataFrame');
            var doc = frame.contentDocument || frame.contentWindow.document;
            var text = doc.body.textContent || doc.body.innerText || '';
            if (!text.trim()) return;
            try {
                var list = JSON.parse(text);
            } catch (e) {
                return;
            }
            var tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            if (list.length === 0) {
                tbody.innerHTML = '<tr class="ltr"><td colspan="4" style="text-align:center; color:#999;">无访问记录</td></tr>';
                return;
            }
            for (var i = 0; i < list.length; i++) {
                var row = list[i];
                var tr = document.createElement('tr');
                tr.className = 'ltr';
                tr.innerHTML = '<td>' + row.id + '</td>' +
                    '<td>' + escapeHtml(row.userName) + '</td>' +
                    '<td class="url-cell">' + escapeHtml(row.url) + '</td>' +
                    '<td>' + escapeHtml(row.visitTime) + '</td>';
                tbody.appendChild(tr);
            }
        }

        function escapeHtml(s) {
            if (!s) return '';
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
    </script>
</head>
<body onload="loadData()">
    <h1 class="ht">访问历史</h1>
    <h3 class="ht"><a href="index.html">返回首页</a></h3>

    <form id="searchForm" method="post" action="/history" target="dataFrame">
        <table class="tab" cellspacing="0px">
            <tr class="ltr">
                <td style="width:100px;">用户名</td>
                <td><input type="text" class="ipt" name="userName" placeholder="输入用户名筛选..."></td>
                <td style="width:100px;">URL 关键字</td>
                <td><input type="text" class="ipt" name="urlKeyword" placeholder="输入URL关键字..."></td>
                <td class="buttonContainer" style="width:80px;">
                    <input type="submit" class="btn1" value="查询">
                </td>
            </tr>
        </table>
    </form>

    <br/>

    <table class="tab" cellspacing="0px">
        <tr class="ltr">
            <th>ID</th><th>用户名</th><th>URL</th><th>访问时间</th>
        </tr>
        <tbody id="tableBody">
            <tr class="ltr"><td colspan="4" style="text-align:center; color:#999;">加载中...</td></tr>
        </tbody>
    </table>


    <iframe name="dataFrame" id="dataFrame" style="display:none;" onload="renderData()"></iframe>
</body>
</html>
