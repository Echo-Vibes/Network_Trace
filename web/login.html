<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="GBK">
    <title>登录 - WebTrackDB</title>
    <style>
        .ht { text-align: center; color: cadetblue; font-family: 幼圆; }
        .tab { width: 500px; border: 5px solid cadetblue; margin: 0px auto; border-radius: 5px; font-family: 幼圆; }
        .ltr td { border: 1px solid powderblue; padding: 8px 12px; }
        .ipt { border: 1px solid powderblue; width: 200px; padding: 4px 6px; }
        .btn1 { border: 2px solid powderblue; border-radius: 4px; width: 80px; background-color: antiquewhite; font-family: 幼圆; cursor: pointer; padding: 4px 0; }
        .buttonContainer { text-align: center; }
        .msg { color: rgb(230,87,51); font-family: 幼圆; font-size: 13px; }
    </style>
    <script>
        function submitLogin() {
            var username = document.getElementById('usernameInput').value;
            var password = document.getElementById('userPwdInput').value;
            var msgSpan = document.getElementById('loginMsg');
            if (!username.trim()) {
                msgSpan.innerText = '请输入账号';
                return false;
            }
            if (!password.trim()) {
                msgSpan.innerText = '请输入密码';
                return false;
            }
            msgSpan.innerText = '';
            document.getElementById('loginForm').submit();
            return false;
        }

        function handleResult() {
            var frame = document.getElementById('dataFrame');
            var doc = frame.contentDocument || frame.contentWindow.document;
            var text = doc.body.textContent || doc.body.innerText || '';
            if (!text.trim()) return;
            try {
                var result = JSON.parse(text);
            } catch (e) {
                return;
            }
            if (result.success) {
                window.location.href = 'index.html';
            } else {
                document.getElementById('loginMsg').innerText = result.msg || '登录失败';
            }
        }
    </script>
</head>
<body>
    <h1 class="ht">WebTrackDB 网络监控面板</h1>
    <h3 class="ht">管理员登录</h3>

    <form id="loginForm" method="post" action="/login" target="dataFrame">
        <table class="tab" cellspacing="0px">
            <tr class="ltr">
                <td style="width:80px;">账号</td>
                <td>
                    <input class="ipt" type="text" id="usernameInput" name="username" placeholder="请输入账号">
                </td>
            </tr>
            <tr class="ltr">
                <td>密码</td>
                <td>
                    <input class="ipt" type="password" id="userPwdInput" name="password" placeholder="请输入密码">
                </td>
            </tr>
            <tr class="ltr">
                <td colspan="2" class="buttonContainer">
                    <input class="btn1" type="button" value="登录" onclick="submitLogin()">
                    <input class="btn1" type="reset" value="重置">
                </td>
            </tr>
            <tr class="ltr">
                <td colspan="2" style="text-align:center;">
                    <span class="msg" id="loginMsg"></span>
                </td>
            </tr>
        </table>
    </form>

    <iframe name="dataFrame" id="dataFrame" style="display:none;" onload="handleResult()"></iframe>
</body>
</html>
